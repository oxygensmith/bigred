<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Big Red</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Patrick+Hand+SC&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/styles/main.scss" />
  </head>
  <body>
    <div class="app-shell">
      <main class="game-area">
        <div class="game-column">
          <header class="top-bar">
            <div class="logo">
              <strong>Big Red</strong>
              <span>Large ball vs. 20 small balls</span>
            </div>
            <div class="status-panel">
              <div id="timer">Time 05:00</div>
              <div id="alive-summary">Alive 20 / 20</div>
            </div>
          </header>
          <div class="canvas-wrap">
            <canvas id="game-canvas" width="1200" height="640"></canvas>
            <div id="end-overlay" class="end-overlay end-overlay--hidden">
              <p id="end-headline" class="end-overlay__headline"></p>
              <p id="end-subline" class="end-overlay__subline"></p>
              <p class="end-overlay__prompt">Press Space to play again</p>
            </div>
          </div>
        </div>
        <aside class="scoreboard">
          <div id="health-grid" class="health-grid"></div>
          <div id="diagnostics" class="diagnostics"></div>
        </aside>
      </main>
    </div>
    <script type="module" src="./src/index.js"></script>
  </body>
</html>
